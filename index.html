    <h1>Каталог 2026
    </h1>
    <p>Введите пароль для авторизации</p>
    <div class="input-group">
      <input type="password" id="pwInput" placeholder="Введите пароль..." autocomplete="off">
      <button class="toggle-pw" id="togglePw" type="button">👁</button>
    </div>
    <div class="error-msg" id="errorMsg">Неправильный пароль,повторите попытку.</div>
    <button class="btn-login" id="btnLogin">
      <span class="btn-text">🔓 Авторизоваться</span>
      <div class="spinner"></div>
    </button>
  </div>
</div>

<!-- ═══════ DASHBOARD SCREEN ═══════ -->

      <div class="subtitle">Выберите бренд,чтобы ознакомиться с моделями</div>

    <button class="btn-logout" id="btnLogout">🚪 Logout</button>

  </div>

// ─── PASSWORD (change as needed) ───
const CORRECT_PASSWORD = '1234';

// ─── DOM ───
const loginScreen = document.getElementById('loginScreen');
const dashScreen = document.getElementById('dashScreen');
const loginCard = document.getElementById('loginCard');
const pwInput = document.getElementById('pwInput');
const togglePw = document.getElementById('togglePw');
const errorMsg = document.getElementById('errorMsg');
const btnLogin = document.getElementById('btnLogin');
const btnLogout = document.getElementById('btnLogout');
const categoriesEl = document.getElementById('categories');
const toastContainer = document.getElementById('toastContainer');

// ─── LOGIN LOGIC ───
function attemptLogin() {
  const pw = pwInput.value.trim();
  if (!pw) {
    shakeCard(); return;
  }
  btnLogin.classList.add('loading');
  errorMsg.classList.remove('show');

  setTimeout(() => {
    btnLogin.classList.remove('loading');
    if (pw === CORRECT_PASSWORD) {
      loginScreen.classList.add('hidden');
      setTimeout(() => { dashScreen.classList.remove('hidden'); }, 300);
    } else {
      errorMsg.classList.add('show');
      shakeCard();
      pwInput.value = '';
      pwInput.focus();
    }
  }, 800);
}

function shakeCard() {
  loginCard.classList.add('shake');
  setTimeout(() => loginCard.classList.remove('shake'), 500);
}

btnLogin.addEventListener('click', attemptLogin);
pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') attemptLogin(); });

togglePw.addEventListener('click', () => {
  const isPassword = pwInput.type === 'password';
  pwInput.type = isPassword ? 'text' : 'password';
  togglePw.textContent = isPassword ? '🙈' : '👁';
});

btnLogout.addEventListener('click', () => {
  dashScreen.classList.add('hidden');
  setTimeout(() => {
    loginScreen.classList.remove('hidden');
    pwInput.value = '';
    errorMsg.classList.remove('show');
    // close all open panels
    document.querySelectorAll('.category-card.open').forEach(c => c.classList.remove('open'));
    document.querySelectorAll('.type-item.open').forEach(t => t.classList.remove('open'));
  }, 300);
});

// ─── BUILD CATEGORIES ───
function buildCategories() {
  Object.entries(DATA).forEach(([brand, data]) => {
    const totalModels = Object.values(data.types).reduce((s, t) => s + t.models.length, 0);
    const typeCount = Object.keys(data.types).length;

    const card = document.createElement('div');
    card.className = `category-card cat-${data.color}`;

    let typesHTML = '';
    Object.entries(data.types).forEach(([typeName, typeData]) => {
      let modelsHTML = '';
      typeData.models.forEach(model => {
        modelsHTML += `
          <button class="model-btn" onclick="showToast('${model.name}', '${model.spec}', '${data.color}')">
            <span class="model-dot"></span>
            <span>${model.name}</span>
            <span class="model-spec">${model.spec}</span>
          </button>
        `;
      });

      typesHTML += `
  <div class="type-item">
    <button class="type-btn" onclick="toggleType(this)">
      <span class="type-icon">
        <img src="${typeData.icon}" alt="${typeName}" width="24" height="24">
      </span>
      <span>${typeName}</span>
      <span class="type-count-badge">${typeData.models.length} Моделей</span>
      <span class="type-chevron">›</span>
    </button>
    <div class="model-panel">
      <div class="model-list">
        ${modelsHTML}
      </div>
    </div>
  </div>
`;

    });

    card.innerHTML = `
      <button class="category-btn" onclick="toggleCategory(this)">
        <span class="cat-icon">${data.icon}</span>
        <span>${brand}</span>
        <span class="cat-count">${typeCount} Классов · ${totalModels} Моделей</span>
        <span class="cat-chevron">›</span>
      </button>
      <div class="sub-panel">
        <div class="sub-panel-inner">
          ${typesHTML}
        </div>
      </div>
    `;

    categoriesEl.appendChild(card);
  });
}

function toggleCategory(btn) {
  const card = btn.closest('.category-card');
  const wasOpen = card.classList.contains('open');

  // Close all categories
  document.querySelectorAll('.category-card.open').forEach(c => {
    c.classList.remove('open');
    c.querySelectorAll('.type-item.open').forEach(t => t.classList.remove('open'));
  });

  if (!wasOpen) card.classList.add('open');
}

function toggleType(btn) {
  const item = btn.closest('.type-item');
  const wasOpen = item.classList.contains('open');

  // Close sibling types
  const siblings = item.parentElement.querySelectorAll('.type-item.open');
  siblings.forEach(s => s.classList.remove('open'));

  if (!wasOpen) item.classList.add('open');
}

function showToast(name, spec, color) {
  const colorMap = { verkon: '⚡', quadtrac: '🔶', rhino: '🦏' };
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = `${colorMap[color] || '📋'} <strong>${name}</strong>&nbsp;—&nbsp;${spec}`;
  toastContainer.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

buildCategories();

// ─── PARTICLES ───
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

class Particle {
  constructor() {
    this.reset();
  }
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.vx = (Math.random() - 0.5) * 0.4;
    this.vy = (Math.random() - 0.5) * 0.4;
    this.size = Math.random() * 1.5 + 0.5;
    this.alpha = Math.random() * 0.3 + 0.1;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
    if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(148,163,184,${this.alpha})`;
    ctx.fill();
  }
}

for (let i = 0; i < 60; i++) particles.push(new Particle());

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => { p.update(); p.draw(); });

  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 120) {
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `rgba(148,163,184,${0.06 * (1 - dist / 120)})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }
  requestAnimationFrame(animateParticles);
}
animateParticles();

// Focus password input on load
pwInput.focus();
</script>
